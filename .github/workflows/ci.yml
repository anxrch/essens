name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @essens/core build

      - name: Run core tests
        run: pnpm --filter @essens/core test

      - name: Build sidecar
        run: pnpm --filter @essens/sidecar build

      - name: Type-check desktop
        run: pnpm --filter @essens/desktop check
